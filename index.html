<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>灵感记录</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0;
      font-family: "PingFang SC", "Microsoft YaHei", system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #f8fafc, #e0f2fe);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(900px, 100%);
      background: rgba(255, 255, 255, 0.85);
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
      backdrop-filter: blur(8px);
      padding: 24px;
    }
    h1 { margin: 0 0 8px; font-size: 1.8rem; }
    p { margin: 0 0 16px; color: #475569; }
    .toolbar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
      align-items: center;
    }
    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 600;
      background: #0284c7;
      color: white;
    }
    button.secondary { background: #334155; }
    #status { color: #0f766e; font-size: 0.95rem; }
    textarea {
      width: 100%;
      min-height: 60vh;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      padding: 14px;
      resize: vertical;
      font-size: 1rem;
      line-height: 1.6;
      box-sizing: border-box;
      background: rgba(255, 255, 255, 0.9);
      color: #0f172a;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>✨ 灵感记录板</h1>
    <p>随手记下你的想法、文案、草图描述或项目点子。内容会自动保存在本地浏览器中。</p>
    <div class="toolbar">
      <button id="saveBtn">立即保存</button>
      <button id="clearBtn" class="secondary">清空内容</button>
      <span id="status">准备开始记录...</span>
    </div>
    <textarea id="note" placeholder="在这里写下你的灵感..."></textarea>
  </main>

  <script>
    const storageKey = 'inspiration-note-v1';
    const noteEl = document.getElementById('note');
    const statusEl = document.getElementById('status');
    const saveBtn = document.getElementById('saveBtn');
    const clearBtn = document.getElementById('clearBtn');

    function saveNote() {
      localStorage.setItem(storageKey, noteEl.value);
      const now = new Date();
      statusEl.textContent = `已保存：${now.toLocaleString()}`;
    }

    function loadNote() {
      const saved = localStorage.getItem(storageKey);
      if (saved) {
        noteEl.value = saved;
        statusEl.textContent = '已加载上次记录';
      }
    }

    loadNote();
    noteEl.addEventListener('input', () => {
      saveNote();
    });
    saveBtn.addEventListener('click', saveNote);
    clearBtn.addEventListener('click', () => {
      noteEl.value = '';
      localStorage.removeItem(storageKey);
      statusEl.textContent = '内容已清空';
    });
  </script>
</body>
</html>
